<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra 3D</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
background:#ffffff;

background-image: repeating-linear-gradient(
45deg,
#f2f2f2,
#f2f2f2 2px,
#ffffff 2px,
#ffffff 8px
);
}

/* topo */

header{
padding:70px 20px;
}

h1{
font-size:50px;
margin:0;
}

p{
color:#666;
}

/* área produtos */

.produtos{
display:flex;
justify-content:center;
padding:40px;
}

/* card produto */

.card{

background:white;

width:270px;

padding:20px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,0.1);

transition:0.3s;

}

.card:hover{

transform:translateY(-10px) scale(1.04);

box-shadow:0 20px 40px rgba(0,0,0,0.2);

}

/* imagem */

.card img{

width:100%;

border-radius:10px;

transition:0.3s;

}

.card:hover img{

transform:scale(1.05);

}

/* botão */

.botao{

display:inline-block;

margin-top:15px;

padding:12px 20px;

background:#0071e3;

color:white;

text-decoration:none;

border-radius:8px;

font-weight:bold;

transition:0.3s;

}

.botao:hover{

background:#005dc1;

}

/* rodapé */

footer{

padding:40px;

color:#777;

}

</style>

</head>

<body>

<header>

<h1>Ezra 3D</h1>

<p>Produtos feitos em Impressão 3D</p>

</header>

<section class="produtos">

<div class="card">

<img src="dragao-articulado.png.png">

<h2>Dragão Articulado</h2>

<a class="botao" href="COLE_AQUI_SEU_LINK">
Comprar no Mercado Livre
</a>

</div>

</section>

<footer>

Ezra 3D • Impressão 3D

</footer>

<script>

/* animação ao carregar */

document.body.style.opacity="0";

window.onload=function(){

document.body.style.transition="opacity 1s";

document.body.style.opacity="1";

}

</script>

</body>

</html>
