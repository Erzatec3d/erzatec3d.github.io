<!DOCTYPE html>
<html>
<head>
<title>Ezra 3D</title>
<meta charset="UTF-8">
<style>

body{
font-family: Arial;
margin:0;
background:#0f0f0f;
color:white;
text-align:center;
}

header{
padding:60px;
font-size:40px;
font-weight:bold;
}

.produtos{
display:flex;
justify-content:center;
gap:40px;
padding:40px;
flex-wrap:wrap;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:15px;
width:220px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.botao{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#0071e3;
color:white;
text-decoration:none;
border-radius:8px;
}

</style>
</head>

<body>

<header>

</header>

<h2>Produtos Impressos em 3D</h2>

<div class="produtos">

<div class="card">

</div>

</html>
