<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ezra 3D</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
background-image: radial-gradient(#e6e6e6 1px, transparent 1px);
background-size:40px 40px;
color:#111;
}

header{
text-align:center;
padding:80px 20px;
}

header h1{
font-size:55px;
margin:0;
}

header p{
color:#666;
font-size:20px;
}

.produtos{
display:flex;
justify-content:center;
gap:40px;
padding:60px;
flex-wrap:wrap;
}

.card{
background:white;
width:240px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
padding:20px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.card img{
width:100%;
border-radius:10px;
}

.botao{
display:inline-block;
margin-top:10px;
padding:10px 18px;
background:#0071e3;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.botao:hover{
background:#005dc1;
}

footer{
text-align:center;
padding:40px;
color:#777;
}

</style>
</head>

<body>

<header>
<h1>Ezra 3D</h1>
<p>Produtos feitos em impressão 3D</p>
</header>

<section class="produtos">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Produto 1</h3>
<a class="botao" href="#">Comprar</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Produto 2</h3>
<a class="botao" href="#">Comprar</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Produto 3</h3>
<a class="botao" href="#">Comprar</a>
</div>

</section>

<footer>
Ezra 3D • Impressão 3D
</footer>

</body>
</html>
