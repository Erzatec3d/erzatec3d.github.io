<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra 3D</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f7;

/* textura tipo camadas da impressão */

background-image: repeating-linear-gradient(
45deg,
#ececec,
#ececec 2px,
#f5f5f7 2px,
#f5f5f7 8px
);

}

/* container central */

.container{

max-width:1100px;

margin:auto;

padding:40px;

background:white;

border-radius:20px;

margin-top:40px;

box-shadow:0 20px 60px rgba(0,0,0,0.1);

border:1px solid #e5e5e5;

}

/* topo */

header{

text-align:center;

padding-bottom:30px;

border-bottom:1px solid #eee;

}

header h1{

font-size:50px;

margin:0;

}

header p{

color:#777;

}

/* produtos */

.produtos{

display:flex;

justify-content:center;

gap:40px;

flex-wrap:wrap;

padding-top:40px;

}

/* card */

.card{

background:#fff;

border-radius:16px;

width:260px;

padding:20px;

text-align:center;

border:1px solid #eee;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

transition:0.35s;

}

.card:hover{

transform:translateY(-12px) scale(1.03);

box-shadow:0 25px 50px rgba(0,0,0,0.15);

}

/* imagem */

.card img{

width:100%;

border-radius:12px;

transition:0.3s;

}

.card:hover img{

transform:scale(1.05);

}

/* botão */

.botao{

display:inline-block;

margin-top:15px;

padding:12px 22px;

background:#0071e3;

color:white;

text-decoration:none;

border-radius:8px;

font-weight:bold;

transition:0.3s;

}

.botao:hover{

background:#005dc1;

}

/* rodapé */

footer{

text-align:center;

margin-top:40px;

color:#777;

font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<header>

<h1>Ezra 3D</h1>

<p>Produtos criados com Impressão 3D</p>

</header>

<section class="produtos">

<div class="card">

<img src="dragao-articulado.png.png">

<h2>Dragão Articulado</h2>

<a class="botao" href="COLE_SEU_LINK_AQUI">
Comprar no Mercado Livre
</a>

</div>

</section>

<footer>

Ezra 3D • Impressão 3D

</footer>

</div>

<script>

/* animação de entrada */

document.body.style.opacity="0";

window.onload=function(){

document.body.style.transition="opacity 1s";

document.body.style.opacity="1";

}

</script>

</body>

</html>
