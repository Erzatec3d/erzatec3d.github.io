body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:#111;

background-color:#ffffff;

background-image:

45deg,
#f2f2f2,

#ffffff 2px,
#ffffff 8px

}

/* topo */

header{
text-align:center;
padding:90px 20px;
}

header h1{
font-size:60px;
margin:0;
}

header p{
font-size:20px;
color:#666;
margin-top:10px;
}

/* área de produtos */

.produtos{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
padding:60px;
}

/* cards */

.card{
background:white;
width:240px;
border-radius:20px;
padding:20px;
text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.card img{
width:100%;
border-radius:10px;
}
