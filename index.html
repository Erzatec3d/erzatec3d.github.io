<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra 3D</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f7;

background-image: repeating-linear-gradient(
45deg,
#ececec,
#ececec 2px,
#f5f5f7 2px,
#f5f5f7 8px
);
}

/* MENU SUPERIOR */

nav{

background:white;

box-shadow:0 5px 20px rgba(0,0,0,0.08);

padding:15px 40px;

display:flex;

justify-content:space-between;

align-items:center;

position:sticky;

top:0;

z-index:1000;

}

.logo{

font-size:22px;

font-weight:bold;

}

.menu{

display:flex;

gap:25px;

}

.menu a{

text-decoration:none;

color:#444;

font-weight:bold;

transition:0.3s;

}

.menu a:hover{

color:#0071e3;

}

/* HERO */

.hero{

text-align:center;

padding:80px 20px;

}

.hero h1{

font-size:55px;

margin:0;

}

.hero p{

color:#777;

font-size:20px;

}

/* PRODUTOS */

.produtos{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:40px;

padding:40px;

}

/* CARD */

.card{

background:white;

width:260px;

border-radius:18px;

padding:20px;

text-align:center;

border:1px solid #eee;

box-shadow:0 15px 35px rgba(0,0,0,0.08);

transition:transform 0.3s, box-shadow 0.3s;

}

.card:hover{

transform:translateY(-12px) scale(1.04);

box-shadow:0 30px 60px rgba(0,0,0,0.15);

}

/* IMAGEM */

.card img{

width:100%;

border-radius:12px;

transition:0.3s;

}

.card:hover img{

transform:scale(1.05);

}

/* BOTÃO */

.botao{

display:inline-block;

margin-top:15px;

padding:12px 22px;

background:#0071e3;

color:white;

text-decoration:none;

border-radius:8px;

font-weight:bold;

transition:0.3s;

}

.botao:hover{

background:#005dc1;

}

/* RODAPÉ */

footer{

margin-top:60px;

background:white;

padding:30px;

text-align:center;

border-top:1px solid #eee;

}

footer p{

color:#777;

margin:5px;

}

</style>

</head>

<body>

<nav>

<div class="logo">Ezra 3D</div>

<div class="menu">

<a href="#">Início</a>
<a href="#">Meus Produtos</a>
<a href="#">Contato</a>

</div>

</nav>

<section class="hero">

<h1>Ezra 3D</h1>

<p>Criações incríveis feitas em Impressão 3D</p>

</section>

<section class="produtos">

<div class="card">

<img src="dragao-articulado.png.png">

<h2>Dragão Articulado</h2>

<a class="botao" href="#">
Comprar no Mercado Livre
</a>

</div>

</section>

<footer>

<p>© Ezra 3D</p>
<p>Produtos feitos em Impressão 3D</p>

</footer>

<script>

/* ANIMAÇÃO AO CARREGAR */

document.body.style.opacity="0";

window.onload=function(){

document.body.style.transition="opacity 1.2s";

document.body.style.opacity="1";

}

/* EFEITO 3D SEGUINDO O MOUSE */

const cards = document.querySelectorAll(".card");

cards.forEach(card => {

card.addEventListener("mousemove", (e)=>{

const rect = card.getBoundingClientRect();

const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

const centerX = rect.width / 2;
const centerY = rect.height / 2;

const rotateX = (y - centerY) / 20;
const rotateY = (centerX - x) / 20;

card.style.transform =
`rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;

});

card.addEventListener("mouseleave", ()=>{

card.style.transform="rotateX(0) rotateY(0) scale(1)";

});

});

</script>

</body>

</html>
