<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra 3D</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f7;

background-image: repeating-linear-gradient(
45deg,
#ececec,
#ececec 2px,
#f5f5f7 2px,
#f5f5f7 8px
);
}

/* container */

.container{
max-width:1100px;
margin:auto;
padding:40px;
background:white;
border-radius:20px;
margin-top:40px;
box-shadow:0 20px 60px rgba(0,0,0,0.1);
border:1px solid #e5e5e5;
}

/* topo */

header{
text-align:center;
padding-bottom:30px;
border-bottom:1px solid #eee;
}

header h1{
font-size:50px;
margin:0;
}

header p{
color:#777;
}

/* produtos */

.produtos{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding-top:40px;
}

.card{
background:#fff;
border-radius:16px;
width:260px;
padding:20px;
text-align:center;
border:1px solid #eee;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.35s;
}

.card:hover{
transform:translateY(-12px) scale(1.03);
box-shadow:0 25px 50px rgba(0,0,0,0.15);
}

.card img{
width:100%;
border-radius:12px;
}

.botao{
display:inline-block;
margin-top:15px;
padding:12px 22px;
background:#0071e3;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.botao:hover{
background:#005dc1;
}

/* rodapé */

footer{
margin-top:40px;
border-top:1px solid #eee;
padding-top:20px;
text-align:center;
}

/* menu rodapé */

.footer-menu{
display:flex;
justify-content:center;
gap:30px;
margin-bottom:15px;
}

.footer-item{
cursor:pointer;
color:#666;
font-weight:bold;
transition:0.3s;
}

.footer-item:hover{
color:#0071e3;
}

.copyright{
font-size:14px;
color:#999;
}

</style>

</head>

<body>

<div class="container">

<header>

<h1>Ezra 3D</h1>
<p>Produtos criados com Impressão 3D</p>

</header>

<section class="produtos">

<div class="card">

<img src="dragao-articulado.png.png">

<h2>Dragão Articulado</h2>

<a class="botao" href="#">
Comprar no Mercado Livre
</a>

</div>

</section>

<footer>

<div class="footer-menu">

<div class="footer-item">Início</div>
<div class="footer-item">Produtos</div>
<div class="footer-item">Contato</div>

</div>

<div class="copyright">
© Ezra 3D • Impressão 3D
</div>

</footer>

</div>

<script>

/* efeito extra ao passar o mouse */

const itens = document.querySelectorAll(".footer-item");

itens.forEach(item => {

item.addEventListener("mouseover", function(){
this.style.transform="scale(1.1)";
});

item.addEventListener("mouseout", function(){
this.style.transform="scale(1)";
});

});

</script>

</body>

</html>
