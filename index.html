<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezra 3D</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:#111;

/* fundo branco com linhas de filamento */

background-color:#ffffff;

background-image:
repeating-linear-gradient(
45deg,
#f1f1f1,
#f1f1f1 2px,
#ffffff 2px,
#ffffff 8px
);
}

/* topo */

header{
text-align:center;
padding:80px 20px;
}

header h1{
font-size:60px;
margin:0;
}

header p{
font-size:20px;
color:#666;
margin-top:10px;
}

/* produtos */

.produtos{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
padding:50px;
}

/* card */

.card{
background:white;
width:250px;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.card img{
width:100%;
border-radius:12px;
}

.card h3{
margin-top:15px;
font-size:18px;
}

/* botão */

.botao{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#0071e3;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
transition:0.2s;
}
