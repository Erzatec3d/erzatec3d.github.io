<header>
  <h1>Sobradinho Notebooks</h1>
  <nav>
    <ul id="menu-topo">
      <li><a href="#produtos">Produtos</a></li>
      <li><a href="#servicos">Serviços</a></li>
      <li><a href="#contato">Contato</a></li>
    </ul>
  </nav>
</header>

<script>
  // Pegando todos os links do menu
  const links = document.querySelectorAll('#menu-topo a');

  // Função de scroll suave
  links.forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      target.scrollIntoView({ behavior: 'smooth' });
    });

    // Efeito hover JS (destaca o link ativo)
    link.addEventListener('mouseenter', function() {
      this.style.color = '#0af';
      this.style.transform = 'scale(1.2)';
      this.style.transition = 'all 0.3s';
    });
    link.addEventListener('mouseleave', function() {
      this.style.color = '#fff';
      this.style.transform = 'scale(1)';
    });
  });

  // Detecta qual seção está visível e marca ativo
  window.addEventListener('scroll', () => {
    let fromTop = window.scrollY + 100; // Ajuste do offset
    links.forEach(link => {
      const section = document.querySelector(link.getAttribute('href'));
      if (
        section.offsetTop <= fromTop &&
        section.offsetTop + section.offsetHeight > fromTop
      ) {
        link.style.color = '#0af';
        link.style.fontWeight = 'bold';
      } else {
        link.style.color = '#fff';
        link.style.fontWeight = 'normal';
      }
    });
  });
</script>
