<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezra 3D</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:#111;
background:#ffffff;

/* textura 3D suave */

background-image:
radial-gradient(circle at 20% 20%, #f3f3f3 0%, transparent 40%),
radial-gradient(circle at 80% 30%, #f5f5f5 0%, transparent 40%),
radial-gradient(circle at 40% 80%, #eeeeee 0%, transparent 40%);

background-size:600px 600px;
background-repeat:no-repeat;
}

/* topo */

header{
text-align:center;
padding:90px 20px;
}

header h1{
font-size:60px;
margin:0;
}

header p{
font-size:20px;
color:#666;
margin-top:10px;
}
