<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra 3D</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#ffffff;
color:#111;

/* textura tipo linhas de filamento */

background-image: repeating-linear-gradient(
45deg,
#f3f3f3,
#f3f3f3 2px,
#ffffff 2px,
#ffffff 10px
);
}

/* topo */

header{
text-align:center;
padding:80px 20px;
}

header h1{
font-size:60px;
margin:0;
}

header p{
font-size:20px;
color:#666;
margin-top:10px;
}

/* área produtos */

.produtos{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
padding:50px;
}

/* card */

.card{
background:#ffffff;
width:250px;
padding:20px;
border-radius:20px;
text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin-top:15px;
font-size:18px;
}

/* botão */

.botao{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#0071e3;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.botao:hover{
background:#005dc1;
}

/* rodapé */

footer{
text-align:center;
padding:40px;
color:#777;
font-size:14px;
}

</style>

</head>

<body>

<header>

<h1>Ezra 3D</h1>

<p>Produtos criados com Impressão 3D</p>

</header>

<section class="produtos">

<div class="card">

<img src="https://via.placeholder.com/300">

<h3>Dragão Articulado</h3>

<a class="botao" href="#">Comprar</a>

</div>

<div class="card">

<img src="https://via.placeholder.com/300">

<h3>Suporte para Celular</h3>

<a class="botao" href="#">Comprar</a>

</div>

<div class="card">

<img src="https://via.placeholder.com/300">

<h3>Miniatura Decorativa</h3>

<a class="botao" href="#">Comprar</a>

</div>

<div class="card">

<img src="https://via.placeholder.com/300">

<h3>Boneco Articulado</h3>

<a class="botao" href="#">Comprar</a>

</div>

</section>

<footer>

Ezra 3D • Produtos feitos em Impressão 3D

</footer>

</body>

</html>
